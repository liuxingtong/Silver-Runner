<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Type 02 · 医疗重度使用者</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
  :root{--r:#E91E8C;--rl:#FF4DAD;--rd:rgba(233,30,140,0.15);--rb:rgba(233,30,140,0.35);--bg:#0C0C12;--bg-card:#12121C;--bg-panel:#1A1A28;--t1:#F0F0F8;--t2:#8888AA;--t3:#555568;--grid:rgba(233,30,140,0.07);}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;word-break:keep-all;line-break:strict;}
  .card{width:min(380px,100%);background:var(--bg-card);border:1px solid var(--rb);border-radius:20px;overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(233,30,140,0.1),0 0 40px rgba(233,30,140,0.08),0 20px 60px rgba(0,0,0,0.6);}
  .card::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0;}
  .card::after{content:'';position:absolute;top:-80px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(233,30,140,0.18) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .card>*{position:relative;z-index:1;}
  .ch{padding:18px 22px 14px;border-bottom:1px solid var(--rb);display:flex;align-items:center;gap:10px;}
  .badge{background:var(--r);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:3px 10px;border-radius:4px;}
  .clabel{font-size:13px;color:var(--t2);}
  .dot{margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--r);box-shadow:0 0 8px var(--r);animation:pd 2s infinite;}
  @keyframes pd{0%,100%{opacity:1}50%{opacity:.4}}
  .ct{display:grid;grid-template-columns:148px 1fr;min-height:170px;border-bottom:1px solid var(--rb);}
  .ib{border-right:1px solid var(--rb);display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--bg-panel),var(--bg-card));padding:16px;position:relative;overflow:hidden;}
  .ib::after{content:'';position:absolute;bottom:-30px;left:-30px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(233,30,140,0.12),transparent 70%);}
  .ip{width:100px;height:110px;border:1.5px dashed var(--rb);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;z-index:1;}
  .ip svg{opacity:0.35;} .ip span{font-size:10px;color:var(--t3);}
  .ip.ip-photo{padding:4px;border-style:solid;border-color:rgba(233,30,140,0.22);background:rgba(233,30,140,0.05);}
  .ip.ip-photo img{width:100%;height:100%;object-fit:contain;display:block;}
  .sc{padding:16px 16px 14px;display:flex;flex-direction:column;gap:10px;}
  .pn{font-size:18px;font-weight:700;color:var(--t1);line-height:1.2;display:flex;flex-direction:column;gap:4px;align-items:flex-start;}
  .sr{display:flex;flex-direction:column;gap:2px;}
  .sl{font-size:9px;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;}
  .sv{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--t1);}
  .sv.a{color:var(--rl);}
  .pr{display:flex;align-items:center;gap:8px;margin-top:2px;}
  .dw{position:relative;width:40px;height:40px;flex-shrink:0;}
  .dw svg{transform:rotate(-90deg);}
  .dc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;color:var(--rl);}
  .pl{font-size:10px;color:var(--t2);line-height:1.4;}
  .fs{padding:14px 18px;border-bottom:1px solid var(--rb);}
  .fs svg{width:100%;display:block;}
  .mr{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--rb);}
  .mi{padding:12px 16px;display:flex;flex-direction:column;gap:4px;}
  .mi:first-child{border-right:1px solid var(--rb);}
  .ml{font-size:9px;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;}
  .mv{font-size:12px;font-weight:500;color:var(--t1);}
  .ab{display:inline-flex;background:var(--rd);border:1px solid var(--rb);border-radius:5px;padding:2px 7px;font-size:11px;color:var(--rl);font-weight:500;}
</style></head><body><div class="card">
  <div class="ch"><span class="badge">Type 02</span><span class="clabel">医疗重度使用者</span><div class="dot"></div></div>
  <div class="ct">
    <div class="ib"><div class="ip ip-photo"><img src="persona-illust-2.png" alt="医疗重度使用者 · 简笔插图" width="92" height="102" loading="lazy" decoding="async"/></div></div>
    <div class="sc">
      <div class="pn"><span>慢病管理老人</span><small style="font-size:12px;font-weight:400;color:var(--t2)">医疗重度使用者</small></div>
      <div class="sr"><span class="sl">年龄范围</span><span class="sv">65 – 75 岁</span></div>
      <div class="sr"><span class="sl">全国慢病老年人</span><span class="sv a">1.8 亿</span></div>
      <div class="pr">
        <div class="dw"><svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="15" fill="none" stroke="#1E1E30" stroke-width="5"/><circle cx="20" cy="20" r="15" fill="none" stroke="#E91E8C" stroke-width="5" stroke-dasharray="23.6 70.7" stroke-linecap="round"/></svg><div class="dc">25%</div></div>
        <div class="pl">人群占比 · 认知症患者 1507 万</div>
      </div>
    </div>
  </div>

  <!-- FLOW: 就医路径 + 候诊溢出圈 -->
  <div class="fs">
    <svg viewBox="0 0 344 118" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="wait" cx="50%" cy="50%">
          <stop offset="0%"   stop-color="#E91E8C" stop-opacity=".22"/>
          <stop offset="100%" stop-color="#E91E8C" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <text x="0" y="13" fill="rgba(233,30,140,0.6)" font-size="8" font-family="Space Grotesk,sans-serif" letter-spacing=".14em">就医路径 · 候诊溢出</text>

      <!-- 家 -->
      <circle cx="28" cy="60" r="10" fill="rgba(233,30,140,0.12)" stroke="#E91E8C" stroke-width="1.2"/>
      <text x="28" y="63" text-anchor="middle" fill="var(--t2)" font-size="8">家</text>
      <text x="28" y="80" text-anchor="middle" fill="var(--t3)" font-size="8">出发</text>

      <!-- 路径线 (粗=高频) -->
      <line x1="40" y1="60" x2="118" y2="60" stroke="#E91E8C" stroke-width="2.5" stroke-linecap="round" opacity=".6"/>
      <polyline points="108,56 116,60 108,64" fill="none" stroke="#E91E8C" stroke-width="1.2" stroke-linejoin="round"/>

      <!-- 医院 -->
      <circle cx="138" cy="60" r="16" fill="rgba(233,30,140,0.22)" stroke="#E91E8C" stroke-width="1.5"/>
      <text x="138" y="56" text-anchor="middle" fill="var(--rl)" font-size="8" font-family="Space Grotesk,sans-serif" font-weight="700">医院</text>
      <text x="138" y="67" text-anchor="middle" fill="rgba(233,30,140,.65)" font-size="7.5">六院 / 社卫站</text>

      <!-- 候诊等待圈 (溢出) -->
      <circle cx="138" cy="60" r="38" fill="url(#wait)"/>
      <circle cx="138" cy="60" r="38" fill="none" stroke="rgba(233,30,140,.18)" stroke-width="1" stroke-dasharray="4 4"/>
      <circle cx="138" cy="60" r="38" fill="none" stroke="#E91E8C" stroke-width=".6" opacity="0">
        <animate attributeName="r"       values="38;52" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".25;0" dur="2.5s" repeatCount="indefinite"/>
      </circle>

      <!-- 溢出标注 -->
      <text x="138" y="108" text-anchor="middle" fill="rgba(233,30,140,.45)" font-size="7.5">候诊溢出区 · 长时被动停留</text>

      <!-- 右侧：干预机会标注 -->
      <line x1="188" y1="60" x2="230" y2="40" stroke="rgba(233,30,140,.25)" stroke-width=".8" stroke-dasharray="3 3"/>
      <rect x="232" y="28" width="106" height="20" rx="5" fill="rgba(233,30,140,.07)" stroke="rgba(233,30,140,.2)" stroke-width=".8"/>
      <text x="285" y="41" text-anchor="middle" fill="rgba(233,30,140,.65)" font-size="8">被动等待 → 认知训练窗口</text>

      <line x1="188" y1="60" x2="230" y2="75" stroke="rgba(233,30,140,.2)" stroke-width=".8" stroke-dasharray="3 3"/>
      <rect x="232" y="64" width="106" height="20" rx="5" fill="rgba(233,30,140,.05)" stroke="rgba(233,30,140,.15)" stroke-width=".8"/>
      <text x="285" y="77" text-anchor="middle" fill="rgba(233,30,140,.45)" font-size="8">医疗焦虑高 · 空间警惕性强</text>
    </svg>
  </div>

  <div class="mr">
    <div class="mi"><div class="ml">核心价值</div><div class="mv">早期干预窗口期</div></div>
    <div class="mi"><div class="ml">对空间技术的态度</div><div class="ab">高需求</div></div>
  </div>
</div></body></html>
