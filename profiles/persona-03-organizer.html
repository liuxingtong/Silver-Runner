<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Type 03 · 晨练社群组织者</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
  :root{--r:#E91E8C;--rl:#FF4DAD;--rd:rgba(233,30,140,0.15);--rb:rgba(233,30,140,0.35);--bg:#0C0C12;--bg-card:#12121C;--bg-panel:#1A1A28;--t1:#F0F0F8;--t2:#8888AA;--t3:#555568;--grid:rgba(233,30,140,0.07);}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
  .card{width:min(380px,100%);background:var(--bg-card);border:1px solid var(--rb);border-radius:20px;overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(233,30,140,0.1),0 0 40px rgba(233,30,140,0.08),0 20px 60px rgba(0,0,0,0.6);}
  .card::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0;}
  .card::after{content:'';position:absolute;top:-80px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(233,30,140,0.18) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .card>*{position:relative;z-index:1;}
  .ch{padding:18px 22px 14px;border-bottom:1px solid var(--rb);display:flex;align-items:center;gap:10px;}
  .badge{background:var(--r);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:3px 10px;border-radius:4px;}
  .clabel{font-size:13px;color:var(--t2);}
  .dot{margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--r);box-shadow:0 0 8px var(--r);animation:pd 2s infinite;}
  @keyframes pd{0%,100%{opacity:1}50%{opacity:.4}}
  .ct{display:grid;grid-template-columns:148px 1fr;min-height:170px;border-bottom:1px solid var(--rb);}
  .ib{border-right:1px solid var(--rb);display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--bg-panel),var(--bg-card));padding:16px;position:relative;overflow:hidden;}
  .ib::after{content:'';position:absolute;bottom:-30px;left:-30px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(233,30,140,0.12),transparent 70%);}
  .ip{width:100px;height:110px;border:1.5px dashed var(--rb);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;z-index:1;}
  .ip svg{opacity:0.35;} .ip span{font-size:10px;color:var(--t3);}
  .ip.ip-photo{padding:4px;border-style:solid;border-color:rgba(233,30,140,0.22);background:rgba(233,30,140,0.05);}
  .ip.ip-photo img{width:100%;height:100%;object-fit:contain;display:block;}
  .sc{padding:16px 16px 14px;display:flex;flex-direction:column;gap:10px;}
  .pn{font-size:18px;font-weight:700;color:var(--t1);line-height:1.2;}
  .sr{display:flex;flex-direction:column;gap:2px;}
  .sl{font-size:9px;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;}
  .sv{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--t1);}
  .sv.a{color:var(--rl);}
  .pr{display:flex;align-items:center;gap:8px;margin-top:2px;}
  .dw{position:relative;width:40px;height:40px;flex-shrink:0;}
  .dw svg{transform:rotate(-90deg);}
  .dc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;color:var(--rl);}
  .pl{font-size:10px;color:var(--t2);line-height:1.4;}
  .fs{padding:14px 18px;border-bottom:1px solid var(--rb);}
  .fs svg{width:100%;display:block;}
  .mr{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--rb);}
  .mi{padding:12px 16px;display:flex;flex-direction:column;gap:4px;}
  .mi:first-child{border-right:1px solid var(--rb);}
  .ml{font-size:9px;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;}
  .mv{font-size:12px;font-weight:500;color:var(--t1);}
  .ab{display:inline-flex;background:var(--rd);border:1px solid var(--rb);border-radius:5px;padding:2px 7px;font-size:11px;color:var(--rl);font-weight:500;}
</style></head><body><div class="card">
  <div class="ch"><span class="badge">Type 03</span><span class="clabel">晨练社群组织者</span><div class="dot"></div></div>
  <div class="ct">
    <div class="ib"><div class="ip ip-photo"><img src="persona-illust-4.png" alt="晨练社群组织者 · 简笔插图" width="92" height="102" loading="lazy" decoding="async"/></div></div>
    <div class="sc">
      <div class="pn">广场政治家<br><small style="font-size:12px;font-weight:400;color:var(--t2)">晨练社群组织者</small></div>
      <div class="sr"><span class="sl">活跃时段</span><span class="sv">6:00 – 8:30</span></div>
      <div class="sr"><span class="sl">全市老年体育团队</span><span class="sv a">2.87 万个</span></div>
      <div class="pr">
        <div class="dw"><svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="15" fill="none" stroke="#1E1E30" stroke-width="5"/><circle cx="20" cy="20" r="15" fill="none" stroke="#E91E8C" stroke-width="5" stroke-dasharray="12.3 82.0" stroke-linecap="round"/></svg><div class="dc">13%</div></div>
        <div class="pl">人群占比<br>参与 58.59 万人</div>
      </div>
    </div>
  </div>

  <!-- FLOW: 辐射枢纽图 — 组织者为中心 -->
  <div class="fs">
    <svg viewBox="0 0 344 118" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hub" cx="50%" cy="50%">
          <stop offset="0%"   stop-color="#E91E8C" stop-opacity=".25"/>
          <stop offset="100%" stop-color="#E91E8C" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <text x="0" y="13" fill="rgba(233,30,140,0.6)" font-size="8" font-family="Space Grotesk,sans-serif" letter-spacing=".14em">社群结构 · 组织者枢纽</text>

      <!-- 中心 -->
      <circle cx="148" cy="66" r="36" fill="url(#hub)"/>
      <circle cx="148" cy="66" r="18" fill="rgba(233,30,140,.18)" stroke="#E91E8C" stroke-width="1.5"/>
      <circle cx="148" cy="66" r="18" fill="none" stroke="#E91E8C" stroke-width=".7" opacity="0">
        <animate attributeName="r"       values="18;34" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".35;0" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="148" cy="66" r="7" fill="#E91E8C"/>
      <text x="148" y="94" text-anchor="middle" fill="var(--rl)" font-size="8.5">组织者</text>

      <!-- spoke 1: 成员群体 (右上) -->
      <line x1="162" y1="52" x2="224" y2="28" stroke="rgba(233,30,140,.38)" stroke-width="1.2"/>
      <circle cx="234" cy="24" r="12" fill="rgba(233,30,140,.10)" stroke="rgba(233,30,140,.35)" stroke-width="1"/>
      <text x="234" y="20" text-anchor="middle" fill="var(--t2)" font-size="8">带动</text>
      <text x="234" y="31" text-anchor="middle" fill="var(--t2)" font-size="8">成员</text>

      <!-- spoke 2: 空间占领 (右) -->
      <line x1="166" y1="66" x2="262" y2="66" stroke="rgba(233,30,140,.38)" stroke-width="1.2"/>
      <rect x="266" y="56" width="70" height="20" rx="5" fill="rgba(233,30,140,.10)" stroke="rgba(233,30,140,.28)" stroke-width="1"/>
      <text x="301" y="69" text-anchor="middle" fill="var(--t2)" font-size="8">定义空间归属</text>

      <!-- spoke 3: 冲突管理 (右下) -->
      <line x1="162" y1="80" x2="224" y2="104" stroke="rgba(233,30,140,.22)" stroke-width="1"/>
      <circle cx="234" cy="108" r="12" fill="rgba(233,30,140,.06)" stroke="rgba(233,30,140,.20)" stroke-width="1"/>
      <text x="234" y="104" text-anchor="middle" fill="var(--t3)" font-size="8">领地</text>
      <text x="234" y="115" text-anchor="middle" fill="var(--t3)" font-size="8">冲突</text>

      <!-- spoke 4: 技术传播 (左上) -->
      <line x1="132" y1="52" x2="66" y2="24" stroke="rgba(233,30,140,.45)" stroke-width="1.5" stroke-dasharray="4 2"/>
      <rect x="0" y="14" width="62" height="20" rx="5" fill="rgba(233,30,140,.14)" stroke="rgba(233,30,140,.40)" stroke-width="1"/>
      <text x="31" y="27" text-anchor="middle" fill="var(--rl)" font-size="8">新技术传播</text>
      <text x="31" y="13" text-anchor="middle" fill="rgba(233,30,140,.45)" font-size="7">最先接受</text>

      <!-- 时间标注 -->
      <text x="0" y="110" fill="var(--t3)" font-size="8">06:00</text>
      <line x1="30" y1="107" x2="74" y2="107" stroke="var(--t3)" stroke-width=".8"/>
      <text x="76" y="110" fill="var(--t3)" font-size="8">08:30</text>
      <text x="56" y="100" text-anchor="middle" fill="var(--t3)" font-size="7.5">固定时段</text>
    </svg>
  </div>

  <div class="mr">
    <div class="mi"><div class="ml">社群角色</div><div class="mv">空间的定义者</div></div>
    <div class="mi"><div class="ml">对空间技术的态度</div><div class="ab">主动带头</div></div>
  </div>
</div></body></html>
