<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空间节点类型</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=Noto+Sans+SC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#08080E; --card:#0D0D18; --grid:rgba(255,255,255,0.025);
    --a:#E91E8C; --al:#FF4DAD; --ad:rgba(233,30,140,0.10); --ab:rgba(233,30,140,0.28);
    --b:#C2186B; --bl:#FF4DAD; --bd:rgba(233,30,140,0.12); --bb:rgba(233,30,140,0.34);
    --c:#AD1457; --cl:#FF4DAD; --cd:rgba(233,30,140,0.12); --cb:rgba(233,30,140,0.36);
    --t1:#FDF2F8; --t2:#9B7A8F; --t3:rgba(233,30,140,0.42);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 28px;font-family:'Noto Sans SC',sans-serif;word-break:keep-all;line-break:strict;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:1060px;}

  .card{border-radius:20px;background:var(--card);overflow:hidden;display:flex;flex-direction:column;position:relative;}
  .card::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:20px 20px;z-index:0;}
  .card>*{position:relative;z-index:1;}
  .ca{border:1px solid var(--ab);box-shadow:0 0 50px rgba(233,30,140,0.08);}
  .cb{border:1px solid var(--bb);box-shadow:0 0 50px rgba(233,30,140,0.08);}
  .cc{border:1px solid var(--cb);box-shadow:0 0 50px rgba(233,30,140,0.08);}
  .ca::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--a),transparent);z-index:2;}
  .cb::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--b),transparent);z-index:2;}
  .cc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--c),transparent);z-index:2;}

  .ch{padding:15px 18px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid;}
  .ca .ch{border-color:var(--ab);} .cb .ch{border-color:var(--bb);} .cc .ch{border-color:var(--cb);}
  .badge{font-family:'DM Mono',monospace;font-size:8.5px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;padding:2px 8px;border-radius:4px;}
  .ca .badge{background:var(--ad);border:1px solid var(--ab);color:var(--al);}
  .cb .badge{background:var(--bd);border:1px solid var(--bb);color:var(--bl);}
  .cc .badge{background:var(--cd);border:1px solid var(--cb);color:var(--cl);}
  .name{font-size:15px;font-weight:700;color:var(--t1);}

  .diag{height:268px;overflow:hidden;}
  .diag svg{width:100%;height:100%;}

  .strip{padding:12px 18px 14px;display:flex;flex-direction:column;gap:7px;border-top:1px solid;}
  .ca .strip{border-color:var(--ab);background:linear-gradient(90deg,var(--ad),transparent);}
  .cb .strip{border-color:var(--bb);background:linear-gradient(90deg,var(--bd),transparent);}
  .cc .strip{border-color:var(--cb);background:linear-gradient(90deg,var(--cd),transparent);}
  .kv{display:flex;align-items:baseline;gap:8px;}
  .k{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:0.1em;min-width:60px;}
  .v{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}
  .ca .v{color:var(--al);} .cb .v{color:var(--bl);} .cc .v{color:var(--cl);}
  .vn{font-size:10px;color:rgba(233,30,140,0.48);font-family:'DM Mono',monospace;}
  .desc{font-size:10.5px;color:rgba(255,77,173,0.55);line-height:1.6;border-top:1px solid rgba(233,30,140,0.12);padding-top:7px;margin-top:1px;}
  .ca .desc strong{color:var(--al);} .cb .desc strong{color:var(--bl);} .cc .desc strong{color:var(--cl);}

  @media (max-width: 960px) {
    .grid { grid-template-columns: 1fr; max-width: 420px; }
  }
</style>
</head>
<body>
<div class="grid">

  <!-- N-01 激活节点 -->
  <div class="card ca">
    <div class="ch"><span class="badge">N-01</span><span class="name">激活节点</span></div>
    <div class="diag">
      <svg viewBox="0 0 320 268" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="ag" cx="50%" cy="44%">
            <stop offset="0%"   stop-color="#E91E8C" stop-opacity=".22"/>
            <stop offset="60%"  stop-color="#E91E8C" stop-opacity=".05"/>
            <stop offset="100%" stop-color="#E91E8C" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="160" cy="118" rx="116" ry="96" fill="url(#ag)"/>
        <circle cx="160" cy="118" r="92" fill="none" stroke="rgba(233,30,140,.09)" stroke-width="1" stroke-dasharray="4 5"/>
        <circle cx="160" cy="118" r="55" fill="none" stroke="rgba(233,30,140,.15)" stroke-width="1"/>
        <line x1="160" y1="118" x2="72"  y2="52"  stroke="rgba(233,30,140,.28)" stroke-width="1.2"/>
        <line x1="160" y1="118" x2="248" y2="52"  stroke="rgba(233,30,140,.28)" stroke-width="1.2"/>
        <line x1="160" y1="118" x2="160" y2="208" stroke="rgba(233,30,140,.28)" stroke-width="1.2"/>
        <circle cx="72" cy="52" r="20" fill="rgba(233,30,140,.09)" stroke="#E91E8C" stroke-width="1.2"/>
        <circle cx="72" cy="52" r="7"  fill="#E91E8C" opacity=".85"/>
        <text x="72" y="88" text-anchor="middle" fill="rgba(233,30,140,.5)"  font-size="7.5" font-family="DM Mono,monospace">W_elder ↑</text>
        <text x="72" y="99" text-anchor="middle" fill="rgba(233,30,140,.42)" font-size="7"   font-family="Noto Sans SC,sans-serif">斜土路型</text>
        <circle cx="248" cy="52" r="20" fill="rgba(233,30,140,.09)" stroke="#E91E8C" stroke-width="1.2"/>
        <circle cx="248" cy="52" r="7"  fill="#E91E8C" opacity=".70"/>
        <text x="248" y="88" text-anchor="middle" fill="rgba(233,30,140,.45)" font-size="7.5" font-family="DM Mono,monospace">W_work ↑</text>
        <text x="248" y="99" text-anchor="middle" fill="rgba(233,30,140,.42)" font-size="7"   font-family="Noto Sans SC,sans-serif">田子坊型</text>
        <circle cx="160" cy="208" r="22" fill="rgba(233,30,140,.16)" stroke="#E91E8C" stroke-width="1.5"/>
        <circle cx="160" cy="208" r="9"  fill="#E91E8C"/>
        <text x="160" y="212" text-anchor="middle" fill="#fff" font-size="9" font-family="DM Mono,monospace">✦</text>
        <text x="196" y="207" fill="rgba(233,30,140,.55)" font-size="7.5" font-family="DM Mono,monospace">双向停留 · RARE</text>
        <circle cx="160" cy="118" r="24" fill="rgba(233,30,140,.2)" stroke="#E91E8C" stroke-width="1.5"/>
        <circle cx="160" cy="118" r="24" fill="none" stroke="#FF4DAD" stroke-width=".8" opacity="0">
          <animate attributeName="r"       values="24;46" dur="2.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".5;0"  dur="2.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="160" cy="118" r="10" fill="#E91E8C"/>
        <text x="160" y="122" text-anchor="middle" fill="#fff" font-size="7.5" font-family="DM Mono,monospace" font-weight="500">CSVI·HI</text>
      </svg>
    </div>
    <div class="strip">
      <div class="kv"><span class="k">W_elder</span><span class="v">E × (AC_phys+1)</span></div>
      <div class="kv"><span class="k">CSVI</span><span class="v">高</span></div>
      <div class="kv"><span class="k">干预效益</span><span class="v">最高</span></div>
      <div class="desc">脆弱性集中、<strong>且可操作</strong></div>
    </div>
  </div>

  <!-- N-02 瓶颈节点 -->
  <div class="card cb">
    <div class="ch"><span class="badge">N-02</span><span class="name">瓶颈节点</span></div>
    <div class="diag">
      <svg viewBox="0 0 320 268" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bl" cx="50%" cy="50%"><stop offset="0%" stop-color="#E91E8C" stop-opacity=".18"/><stop offset="100%" stop-color="#E91E8C" stop-opacity="0"/></radialGradient>
          <radialGradient id="br" cx="50%" cy="50%"><stop offset="0%" stop-color="#E91E8C" stop-opacity=".18"/><stop offset="100%" stop-color="#E91E8C" stop-opacity="0"/></radialGradient>
          <radialGradient id="bw" cx="50%" cy="50%"><stop offset="0%" stop-color="#FF4DAD" stop-opacity=".32"/><stop offset="100%" stop-color="#E91E8C" stop-opacity="0"/></radialGradient>
        </defs>
        <circle cx="60"  cy="134" r="52" fill="url(#bl)"/>
        <circle cx="260" cy="134" r="52" fill="url(#br)"/>
        <path d="M95 116 C138 92 182 92 225 116"  fill="none" stroke="rgba(233,30,140,.28)" stroke-width="2" stroke-linecap="round"/>
        <path d="M95 152 C138 176 182 176 225 152" fill="none" stroke="rgba(233,30,140,.28)" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="160" cy="134" rx="15" ry="38" fill="rgba(233,30,140,.10)" stroke="rgba(233,30,140,.38)" stroke-width="1" stroke-dasharray="4 3"/>
        <circle  cx="160" cy="134" r="32" fill="url(#bw)"/>
        <circle  cx="160" cy="134" r="18" fill="none" stroke="#FF4DAD" stroke-width=".8" opacity="0">
          <animate attributeName="r"       values="18;38" dur="2s"   repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".5;0"  dur="2s"   repeatCount="indefinite"/>
        </circle>
        <polyline points="153,110 159,123 153,134 160,146 153,158" fill="none" stroke="#E91E8C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
        <polyline points="167,110 161,123 167,134 160,146 167,158" fill="none" stroke="#FF4DAD" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity=".55"/>
        <circle cx="160" cy="134" r="5" fill="#FF4DAD" opacity=".95"/>
        <circle cx="60"  cy="134" r="27" fill="rgba(233,30,140,.12)" stroke="#E91E8C" stroke-width="1.3"/>
        <circle cx="60"  cy="134" r="11" fill="#E91E8C" opacity=".8"/>
        <text x="60"  y="173" text-anchor="middle" fill="rgba(233,30,140,.4)" font-size="7.5" font-family="Noto Sans SC,sans-serif">激活节点</text>
        <circle cx="260" cy="134" r="27" fill="rgba(233,30,140,.12)" stroke="#E91E8C" stroke-width="1.3"/>
        <circle cx="260" cy="134" r="11" fill="#E91E8C" opacity=".8"/>
        <text x="260" y="173" text-anchor="middle" fill="rgba(233,30,140,.4)" font-size="7.5" font-family="Noto Sans SC,sans-serif">激活节点</text>
        <text x="160" y="204" text-anchor="middle" fill="rgba(233,30,140,.75)" font-size="8.5" font-family="DM Mono,monospace" font-weight="500">AC_phys · 较低 50%</text>
        <text x="160" y="218" text-anchor="middle" fill="rgba(233,30,140,.52)"   font-size="7.5" font-family="Noto Sans SC,sans-serif">触媒簇交界 · 与场域同源</text>
      </svg>
    </div>
    <div class="strip">
      <div class="kv"><span class="k">AC_phys</span><span class="v">较低 50% <span class="vn">≤ 全域中位</span></span></div>
      <div class="kv"><span class="k">位置</span><span class="v">触媒 DBSCAN 簇扩张交界（与场域一致）</span></div>
      <div class="desc"><strong>基础设施修复优先</strong>，连通性是唯一制约</div>
    </div>
  </div>

  <!-- N-03 临界节点 -->
  <div class="card cc">
    <div class="ch"><span class="badge">N-03</span><span class="name">临界节点</span></div>
    <div class="diag">
      <svg viewBox="0 0 320 268" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="uz" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%"   stop-color="#E91E8C" stop-opacity=".12"/>
            <stop offset="100%" stop-color="#E91E8C" stop-opacity=".03"/>
          </linearGradient>
          <radialGradient id="ng" cx="50%" cy="50%">
            <stop offset="0%"   stop-color="#FF4DAD" stop-opacity=".26"/>
            <stop offset="100%" stop-color="#E91E8C" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect x="0" y="10" width="320" height="116" fill="url(#uz)"/>
        <text x="20" y="30" fill="rgba(233,30,140,.45)" font-size="8" font-family="DM Mono,monospace">▲  ACTIVATION ZONE</text>
        <line x1="0" y1="132" x2="320" y2="132" stroke="#E91E8C" stroke-width="1.5" stroke-dasharray="8 6" opacity=".65"/>
        <text x="228" y="127" fill="rgba(233,30,140,.55)" font-size="8" font-family="DM Mono,monospace" font-weight="500">THRESHOLD</text>
        <rect x="24" y="152" width="224" height="5" rx="2.5" fill="rgba(233,30,140,.08)" stroke="rgba(233,30,140,.22)" stroke-width=".5"/>
        <rect x="24" y="152" width="180" height="5" rx="2.5" fill="rgba(233,30,140,.52)"/>
        <text x="254" y="158" fill="rgba(233,30,140,.55)" font-size="7.5" font-family="DM Mono,monospace">S_contact</text>
        <rect x="24" y="170" width="144" height="3" rx="1.5" fill="rgba(233,30,140,.45)"/>
        <text x="174" y="174" fill="rgba(233,30,140,.48)" font-size="7.5" font-family="DM Mono,monospace">W_work ↑</text>
        <rect x="24" y="180" width="44"  height="3" rx="1.5" fill="rgba(233,30,140,.16)"/>
        <text x="74"  y="184" fill="rgba(233,30,140,.45)" font-size="7.5" font-family="DM Mono,monospace">W_elder ↓</text>
        <circle cx="160" cy="132" r="32" fill="url(#ng)"/>
        <circle cx="160" cy="132" r="17" fill="rgba(233,30,140,.20)" stroke="#E91E8C" stroke-width="1.5"/>
        <circle cx="160" cy="132" r="17" fill="none" stroke="#FF4DAD" stroke-width=".8" opacity="0">
          <animate attributeName="r"       values="17;36" dur="2.8s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".45;0" dur="2.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="160" cy="132" r="6" fill="#E91E8C" opacity=".95"/>
        <line x1="160" y1="110" x2="160" y2="64" stroke="#FF4DAD" stroke-width="1.5" stroke-dasharray="4 4" opacity=".7"/>
        <polygon points="160,52 154,67 166,67" fill="#E91E8C" opacity=".85"/>
        <text x="170" y="74"  fill="rgba(233,30,140,.62)" font-size="8.5" font-family="Noto Sans SC,sans-serif">单一干预</text>
        <text x="170" y="86"  fill="rgba(233,30,140,.40)" font-size="7.5" font-family="Noto Sans SC,sans-serif">撬动象限转变</text>
        <text x="160" y="136" text-anchor="middle" fill="rgba(233,30,140,.35)" font-size="6.5" font-family="DM Mono,monospace">CSVI·MED</text>
        <text x="160" y="226" text-anchor="middle" fill="rgba(233,30,140,.55)" font-size="8" font-family="Noto Sans SC,sans-serif">激活 W_elder → 越过阈值</text>
      </svg>
    </div>
    <div class="strip">
      <div class="kv"><span class="k">CSVI</span><span class="v">中等 <span class="vn">S_contact 主导</span></span></div>
      <div class="kv"><span class="k">W_work</span><span class="v">高 · W_elder 低 <span class="vn">待激活</span></span></div>
      <div class="desc"><strong>增量效率最高</strong>，单一干预撬动象限转变</div>
    </div>
  </div>

</div>
</body>
</html>
