<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感知–优化–干预 闭环</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=Noto+Sans+SC:wght@400;500;700&display=swap');

  :root {
    --bg:   #08080E;
    --card: #0D0D18;
    --grid: rgba(255,255,255,0.025);
    --m:    #E91E8C;
    --ml:   #FF4DAD;
    --mm:   #F062A5;
    --md:   #C2186B;
    --m10:  rgba(233,30,140,0.12);
    --m28:  rgba(233,30,140,0.32);
    --t1: #EEEEF8;
    --t2: #8A8498;
    --t3: #4A4258;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

  html { height: 100%; }
  body {
    background: var(--bg);
    min-height: 100%;
    height: auto;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 14px 18px 18px;
    font-family: 'Noto Sans SC', sans-serif;
    overflow-x: auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    word-break: keep-all;
    line-break: strict;
  }
  @media (min-height: 720px) and (min-width: 960px) {
    body { align-items: center; }
  }

  .wrap { width:100%; max-width:min(940px, 100%); display:flex; flex-direction:column; gap:0; margin:0 auto; }

  .main { display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap; }

  .ring-wrap { flex-shrink:0; width:380px; height:380px; position:relative; }
  .ring-wrap svg { width:100%; height:100%; }

  .card {
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    width: 182px;
    position: relative;
    border: 1px solid var(--m28);
    box-shadow: 0 0 28px rgba(233,30,140,0.08);
  }
  .card::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
    background-image: linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size: 20px 20px;
  }
  .card > * { position:relative; z-index:1; }

  .card::after {
    content:''; position:absolute; top:0; left:0; right:0; height:1.5px;
    background: linear-gradient(90deg, transparent, var(--ml), transparent);
    z-index:2;
  }

  .ch { padding:11px 14px 9px; border-bottom:1px solid var(--m28); display:flex; align-items:center; gap:7px; }

  .badge {
    font-size:9px; font-weight:600; letter-spacing:0.08em;
    padding:2px 8px; border-radius:4px;
    background: var(--m10); border:1px solid var(--m28); color: var(--ml);
  }
  .cn { font-size:13px; font-weight:700; color:var(--t1); }

  .items { padding:10px 14px; display:flex; flex-direction:column; gap:6px; border-bottom:1px solid rgba(255,255,255,.04); }
  .item { display:flex; align-items:flex-start; gap:7px; }
  .item-dot { width:4px; height:4px; border-radius:50%; flex-shrink:0; margin-top:5px; background:var(--ml); }
  .item-text { font-size:10.5px; color:var(--t2); line-height:1.5; }
  .item-text em { font-style:normal; font-weight:600; color:var(--ml); }

  .out { padding:8px 14px 10px; display:flex; align-items:center; gap:8px; }
  .out-label { font-size:10px; color:var(--t2); line-height:1.4; }

  .bottom { display:flex; justify-content:center; padding-top:10px; }
  .card-wide { width:min(560px, 100%); }
  .card-wide .items { display:flex; flex-direction:column; gap:8px; }
  .card-wide .item { flex-direction:row; align-items:flex-start; }
  .card-wide .item-dot { display:block; }
  .card-wide .item-text { font-size:10.5px; }

  @media (max-width: 900px) {
    .ring-wrap { width: min(340px, 88vw); height: min(340px, 88vw); }
    .card { width: min(182px, 42vw); }
    .card-wide { width: 100%; }
  }

  .footer {
    margin-top: 12px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 10px 0;
    border-top: 1px solid rgba(233,30,140,0.12);
  }
  .footer-line { height:1px; flex:1; background:linear-gradient(90deg,transparent,var(--m28)); }
  .footer-line.r { background:linear-gradient(90deg,var(--m28),transparent); }
  .footer-text { font-size:10px; letter-spacing:0.04em; color:var(--t2); }

</style>
</head>
<body>
<div class="wrap">

  <div class="main">

    <div class="card">
      <div class="ch"><span class="badge">干预层</span><span class="cn">具体做什么</span></div>
      <div class="items">
        <div class="item"><div class="item-dot"></div><div class="item-text">调整<strong>声音与光线</strong>，让空间更容易停留、不那么紧张</div></div>
        <div class="item"><div class="item-dot"></div><div class="item-text">用<strong>慢行区、小任务</strong>让人自然放慢、有简短互动</div></div>
        <div class="item"><div class="item-dot"></div><div class="item-text">用<strong>标识与次要节点</strong>把人温柔地引向合适区域</div></div>
      </div>
      <div class="out"><span class="out-label">做完以后，把<strong>效果</strong>传回去，供下一轮判断</span></div>
    </div>

    <div class="ring-wrap">
      <svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="gm"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <radialGradient id="centerglow" cx="50%" cy="50%">
            <stop offset="0%"   stop-color="#E91E8C" stop-opacity=".14"/>
            <stop offset="100%" stop-color="#E91E8C" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <circle cx="240" cy="240" r="108" fill="none" stroke="rgba(233,30,140,0.08)" stroke-width="1" stroke-dasharray="4 5"/>
        <circle cx="240" cy="240" r="155" fill="none" stroke="rgba(233,30,140,0.08)" stroke-width="1" stroke-dasharray="4 5"/>

        <circle cx="240" cy="240" r="115" fill="url(#centerglow)"/>

        <path d="M 240 85 A 155 155 0 0 1 374.3 317.5"
              fill="none" stroke="#FF6BB5" stroke-width="46" stroke-linecap="butt" filter="url(#gm)" opacity=".92"/>
        <path d="M 374.3 317.5 A 155 155 0 0 1 105.7 317.5"
              fill="none" stroke="#E91E8C" stroke-width="46" stroke-linecap="butt" filter="url(#gm)" opacity=".92"/>
        <path d="M 105.7 317.5 A 155 155 0 0 1 240 85"
              fill="none" stroke="#C2186B" stroke-width="46" stroke-linecap="butt" filter="url(#gm)" opacity=".92"/>

        <circle cx="240" cy="240" r="132" fill="none" stroke="rgba(233,30,140,0.15)" stroke-width="1"/>
        <circle cx="240" cy="240" r="178" fill="none" stroke="rgba(233,30,140,0.10)" stroke-width="1"/>

        <polygon points="368.8,327.0  385.1,316.8  369.5,307.8" fill="#FF4DAD" opacity=".85"/>
        <polygon points="100.2,308.0  100.9,316.8  116.5,307.8" fill="#FF4DAD" opacity=".85"/>
        <polygon points="251,85  234,94  234,76" fill="#FF4DAD" opacity=".85"/>

        <text transform="translate(374,162) rotate(-60)"
              text-anchor="middle" fill="#FF9ECB" font-size="11" font-family="Noto Sans SC,sans-serif" font-weight="600">感知</text>
        <text transform="translate(240,398)" text-anchor="middle"
              fill="#FF9ECB" font-size="11" font-family="Noto Sans SC,sans-serif" font-weight="600">优化</text>
        <text transform="translate(106,162) rotate(60)"
              text-anchor="middle" fill="#FF9ECB" font-size="11" font-family="Noto Sans SC,sans-serif" font-weight="600">干预</text>

        <circle cx="240" cy="240" r="105" fill="#0D0D18" stroke="rgba(233,30,140,0.25)" stroke-width="1"/>
        <circle cx="240" cy="240" r="105" fill="none" stroke="#E91E8C" stroke-width=".6" opacity="0">
          <animate attributeName="r"       values="105;130" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".3;0"    dur="3s" repeatCount="indefinite"/>
        </circle>

        <text x="240" y="212" text-anchor="middle"
              fill="rgba(255,158,206,0.55)" font-size="10" font-family="Noto Sans SC,sans-serif" letter-spacing="0.12em">循环运转</text>

        <text x="240" y="262" text-anchor="middle"
              fill="#FF4DAD" font-size="52" font-family="Space Grotesk,sans-serif" font-weight="800" letter-spacing="-.03em">5</text>
        <text x="240" y="282" text-anchor="middle"
              fill="rgba(255,77,173,0.65)" font-size="14" font-family="Noto Sans SC,sans-serif">分钟</text>

        <text x="240" y="304" text-anchor="middle"
              fill="rgba(255,158,206,0.45)" font-size="10" font-family="Noto Sans SC,sans-serif">一轮小结</text>

        <path d="M 215 240 A 25 25 0 1 1 238 215" fill="none" stroke="rgba(233,30,140,0.35)" stroke-width="1.2" stroke-dasharray="3 3"/>
        <polygon points="240,213 233,208 234,218" fill="rgba(255,77,173,0.45)"/>
      </svg>
    </div>

    <div class="card">
      <div class="ch"><span class="badge">感知层</span><span class="cn">看见什么</span></div>
      <div class="items">
        <div class="item"><div class="item-dot"></div><div class="item-text">老人<strong>是不是常在这里停</strong>、停多久</div></div>
        <div class="item"><div class="item-dot"></div><div class="item-text">上班路过的人<strong>走得快还是慢</strong>、挤不挤</div></div>
        <div class="item"><div class="item-dot"></div><div class="item-text"><strong>吵不吵</strong>、人行道<strong>好不好走</strong></div></div>
      </div>
      <div class="out"><span class="out-label">这些信息会用来<strong>判断空间哪里吃力、该帮谁</strong></span></div>
    </div>

  </div>

  <div class="bottom">
    <div class="card card-wide">
      <div class="ch"><span class="badge">优化层</span><span class="cn">怎么选策略</span></div>
      <div class="items">
        <div class="item"><div class="item-dot"></div><div class="item-text">环境对老人<strong>压力大</strong>时：优先<strong>减压、好走、好休息</strong></div></div>
        <div class="item"><div class="item-dot"></div><div class="item-text">老人和上班族<strong>几乎碰不到</strong>时：优先<strong>创造自然、安全的相遇机会</strong></div></div>
        <div class="item"><div class="item-dot"></div><div class="item-text">邻里互助、陪伴<strong>偏弱</strong>时：优先<strong>引导路线和过渡空间</strong></div></div>
      </div>
      <div class="out"><span class="out-label">选定以后，<strong>告诉干预层具体做什么</strong></span></div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-line"></div>
    <div class="footer-text">上一轮的结果，会自动成为下一轮判断的参考</div>
    <div class="footer-line r"></div>
  </div>

</div>
</body>
</html>
